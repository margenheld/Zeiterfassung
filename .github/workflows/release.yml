name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.labels.*.name, 'release:major') ||
       contains(github.event.pull_request.labels.*.name, 'release:minor') ||
       contains(github.event.pull_request.labels.*.name, 'release:patch'))
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "from src.version import VERSION; print(VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION}"

      - name: Fail if tag already exists
        shell: bash
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump src/version.py in your PR before merging."
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --noconsole --name Zeiterfassung --icon assets/margenheld-icon.ico --add-data "assets;assets" --collect-all xhtml2pdf --collect-all reportlab src/main.py

      - name: Install Inno Setup
        shell: powershell
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\InnoSetup" -Wait

      - name: Build installer
        shell: cmd
        run: |
          C:\InnoSetup\ISCC.exe /DAppVer=${{ steps.version.outputs.version }} installer.iss

      - name: Tag and publish release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/Zeiterfassung_Setup.exe \
            --title "Zeiterfassung v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
